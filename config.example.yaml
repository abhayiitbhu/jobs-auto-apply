# Copy to config.yaml and customize.

user:
  name: "Your Name"
  email: "you@example.com"
  phone: "1234567890"
  phone_country_code: ""          # e.g. "+91", "+1" — used to format the phone in cover-letter signatures; blank = print as entered
  linkedin: "https://www.linkedin.com/in/your-handle/"
  github: "https://github.com/your-handle"
  expected_display_name: ""       # first name as shown in the Wellfound nav; blank = derived from `name`

profile:
  # Everything below is an example backend profile — replace with your own.
  headline: "Senior Backend Developer"
  years_experience: 5
  core_skills:
    - Java
    - Spring Boot
    - Python
    - FastAPI
    - Flask
    - AWS
    - Kafka
    - Redis
    - MySQL
    - MongoDB
    - Docker
    - Kubernetes
    - Microservices
    - System Design
    - Platform Engineering
  target_roles:
    - Backend Engineer
    - Java Developer
    - Python Developer
    - Platform Engineer
    - System Architect
    - Solution Architect
    - Forward Deployed Engineer
    - Staff Engineer
  locations:
    - India
    - Bengaluru
    - Mumbai
    - Delhi NCR
    - Hyderabad
    - Pune
    - Chennai
    - Gurgaon
    - Noida
    - Remote
  # Companies you never want to apply to (your current/past employers, etc.).
  skip_companies: []
  # --- Role filtering (domain-agnostic; works for any field) ---
  # The filter KEEPS any title matching keep_role_keywords and SKIPS titles matching
  # skip_role_keywords or skip_role_patterns. Everything is empty by default, so
  # configure it for YOUR field — e.g. a lawyer might keep ["attorney", "counsel",
  # "legal"] and skip ["paralegal", "intern"].
  #
  # "Keep" anchors — kept even if they also match a skip rule (whole words/phrases,
  # case-insensitive). Empty = no anchors. Backend example:
  keep_role_keywords: []
    # - backend
    # - platform
    # - python developer
  # Titles to skip (whole words, case-insensitive). Backend example:
  skip_role_keywords: []
    # - data scientist
    # - sales
  # Advanced: raw regex patterns to skip (matched against the title, case-insensitive).
  # Use for anything plain keywords can't express. Invalid regexes are ignored.
  skip_role_patterns: []
    # - '\bintern(ship)?\b'
  # Skills/domains you have NO experience in: a title about one of these is skipped
  # unless it also names a skill you have. Empty by default. Backend example:
  skip_no_experience_skills: []
    # - salesforce
    # - wordpress

compensation:                  # all in LPA (lakhs per annum); set your own figures
  current_ctc_lpa: 0
  current_fixed_lpa: 0
  current_variable_lpa: 0
  current_esops_lpa: 0
  expected_ctc_lpa: 0

cover_letter:
  mode: dynamic          # dynamic | template
  include_ctc: true
  max_words: 200
  reference_path: "profile/cover_letter_reference.txt"

auth:
  method: browser
  sessions_dir: "data/sessions"
  login_timeout_seconds: 300

paths:
  application_facts: profile/application_facts.yaml
  user_memory: data/user_memory.json
  pending_questions: data/pending_questions.json
  naukri_resume_sync: data/naukri_resume_sync.json
  hirist_resume_sync: data/hirist_resume_sync.json

answers:
  notice_join_threshold_days: 15
  default_year_chip_options:
    - "No experience"
    - "<6 years"
    - "6-8 years"
    - "8+ years"

resume:
  path: "resume.pdf"
  # Upload resume to Wellfound profile/edit before each run (first-time setup only)
  sync_to_wellfound: false
  # Upload resume to Naukri profile before each Naukri run (keeps profile fresh for recruiters)
  sync_to_naukri: true
  naukri_sync_interval_minutes: 30
  # Upload resume to Hirist profile before each Hirist run (only runs during a Hirist flow)
  sync_to_hirist: true
  hirist_sync_interval_minutes: 30

# Fallback static template (used when cover_letter.mode: template)
cover_note: |
  Hi {{company}} team,
  I am applying for {{title}}. Open to roles across India.
  Best, Your Name

wellfound:
  enabled: true
  cookies_file: "cookies.wellfound.json"
  filters:
    # true = use filters saved on your Wellfound profile; config roles/locations ignored
    use_profile_filters: true
    roles:
      - "Backend Engineer"
      - "Software Engineer"
      - "Platform Engineer"
    locations:
      - "India"
      - "Bengaluru"
      - "Remote"
    remote_policy: "some"
    experience_levels:
      - "Senior"
    job_types:
      - "Full-time"
    keywords: "backend java python platform engineer system architect forward deployed"
    skills:
      - "Python"
      - "Java"
      - "AWS"
    salary_min: 4000000
    salary_currency: "INR"
    include_no_salary: true
    recently_active: "week"
    sort: "newest"

uplers:
  enabled: true
  cookies_file: "cookies.uplers.json"
  filters:
    keywords: "backend java python platform engineer architect"
    skills:
      - "Python"
      - "Java"
      - "AWS"
    locations:
      - "Remote"
      - "India"
    roles:
      - "Backend Engineer"
      - "Platform Engineer"
    experience_years_min: 4
    remote_only: false

naukri:
  enabled: true
  cookies_file: "cookies.naukri.json"
  filters:
    keywords: "backend developer java python platform engineer system architect"
    locations: []            # empty = India-wide (no city in search URL)
    experience_min: 3        # Hirist minexp; Naukri uses experience_max only
    experience_max: 6        # Naukri max experience (?experience=6, slider 0–6 yrs)
    sort: freshness               # freshness | date | newest — Naukri UI: "Order by Freshness"
    max_job_age_days: 7           # only jobs posted within N days (1, 3, 7, 15, or 30); omit to disable
    salary_min_lakhs: 35
    remote_only: false
    quick_apply_only: true   # only collect jobs with Quick apply on Naukri
    max_pages: 10            # scroll batches on single SRP (not URL pages)

hirist:
  enabled: true
  cookies_file: "cookies.hirist.json"
  filters:
    max_pages: 10            # apply each SRP page before moving to the next
    experience_min: 4
    experience_max: 6
    # Direct category URLs (preferred) — experience/posting filters in the URL
    search_urls:
      - "https://www.hirist.tech/c/backend-development-jobs?minexp=4&maxexp=6&posting=3"
      - "https://www.hirist.tech/c/emerging-technologies-jobs?minexp=4&maxexp=6&posting=3"
      - "https://www.hirist.tech/k/python-jobs?minexp=4&maxexp=6&posting=3"
      - "https://www.hirist.tech/k/java-jobs?minexp=4&maxexp=6&posting=3"
      - "https://www.hirist.tech/k/nodejs-jobs?minexp=4&maxexp=6&posting=3"
      - "https://www.hirist.tech/k/spring-jobs?minexp=4&maxexp=6&posting=3"
    # Answers from data/user_memory.json; unknown questions → data/pending_questions.json
    # Legacy keyword search (used when search_urls is empty):
    keywords: ["python", "backend"]
    cities: []               # empty = all India (no city in URL)
    experience: "4-6"

instahyre:
  enabled: true
  cookies_file: "cookies.instahyre.json"
  filters:
    # UI filter presets — Instahyre ignores pasted query-param URLs.
    feeds:
      - matching: true
      - search: true
        skills: "java,node,python"
        years: 3
      - search: true
        skills: "java,node,python"
        years: 4
      - search: true
        skills: "java,node,python"
        years: 5
    # Or legacy URL list (parsed into the same feeds):
    # search_urls:
    #   - "https://www.instahyre.com/candidate/opportunities/?matching=true"
    # Legacy UI filters (used when search_urls is empty):
    job_functions:
      - "Backend Development"
      - "Full-Stack Development"
      - "Other Software Development"
    locations:
      - "Bengaluru"
      - "Remote"
    experience_years: 5
    company_size: "All"

application:
  jobs_per_platform: 0          # 0 = unlimited
  max_jobs_per_run: 0
  require_review: false       # true = manual approve via review; false = auto apply on run
  review_dir: "data/review"
  delay_seconds_min: 2
  delay_seconds_max: 5
  apply_workers: 3
  naukri_apply_workers: 5
  hirist_apply_workers: 5
  instahyre_apply_workers: 3
  parallel_platforms: false    # one platform at a time on 16GB unified memory
  pipeline_apply: true         # Naukri + Wellfound: scroll while workers apply
  platform_delays:
    instahyre_ms: 200
    instahyre_advance_ms: 200
    hirist_step_ms: 300
    naukri_chatbot_step_ms: 300
    naukri_chip_poll_ms: 100
  skip_external_ats: true
  follow_external_from_wellfound: false
  skip_location_blocked: true
  skip_ineligible_salary: true
  min_inr_salary_lpa: 25
  apply_retries: 0            # no retry on transient apply failure (faster; set 1 if flaky)
  retry_backoff_ms: 1500      # pause before apply retry when apply_retries > 0
  interactive_questions: false
  confirm_new_answers: true    # Wellfound: confirm suggested answers before applying
                                # Naukri/Hirist: queue new questions and prompt grouped at end of run
  rag_answer_questions: true   # RAG suggestions feed LLM; still requires llm.min_confidence or question is queued
  one_job_per_company: true
  enrich_workers: 1
  dry_run: true

# Ollama local models — run: ./scripts/setup_ollama_models.sh
llm:
  enabled: true
  base_url: "http://127.0.0.1:11434"
  model: job-answers
  # Set verifier_model to "job-answers" to reuse the primary model (only one
  # model resident — best for <=16GB RAM). Use "job-verify" for a dedicated,
  # smaller verifier if you have RAM headroom (run setup_ollama_models.sh).
  verifier_model: job-verify
  verifier_enabled: true   # double-checks only high-risk fields (CTC, employer, years)
  temperature: 0.05
  max_tokens: 256
  keep_alive: "30m"        # keep model loaded between calls (avoids reload latency)
  max_concurrency: 2       # overlap LLM calls across apply-workers; set 1 if RAM-tight
  auto_save: true
  auto_answer_pending: true
  prompt_pending_questions: false
  retry_pending_jobs: true
  min_confidence: 0.92
  min_confidence_rag_agree: 0.88
  vector_agree_score: 0.80   # accept when a similar past answer agrees with the LLM
  min_confidence_new_experience: 0.96
  min_confidence_persist: 0.98   # only write LLM/RAG drafts to user_memory above this
  plain_text_confidence: 0.35
  uncorroborated_confidence_cap: 0.6  # cap LLM confidence when no RAG/vector/verifier backs it (fills, but won't persist)
  rag_agree_input_types:
    - single_choice
    - yes_no_checkbox
    - ctc_numeric
    - years_numeric
    - number
    - pincode
    - date
  use_faiss_memory: true
  rag_top_k: 3
  # Minimum composite similarity score (0..1) a retrieved prior answer must reach.
  # 0.0 disables the cutoff and returns all top-k matches.
  rag_min_score: 0.0
  vector_auto_answer_score: 0.92
  embeddings_model: sentence-transformers/all-MiniLM-L6-v2
  faiss_index_dir: data/faiss

workday:
  password: ""
  how_did_you_hear: "LinkedIn"
  skip_voluntary_disclosures: true
  max_form_pages: 10
  address:
    line1: ""
    city: ""
    state: ""
    postal_code: ""
    country: ""

browser:
  headless: false
  slow_mo_ms: 0                  # 0 = fastest; use 50–100 if clicks miss
  use_chrome_profile: true
  chrome_user_data_dir: ""
  chrome_profile_name: "Default"
  chrome_channel: "chrome"

# Send pending questions to WhatsApp and read your replies, instead of prompting
# in the terminal. Uses an unofficial Playwright-driven WhatsApp Web session
# (no server/tunnel). Link once: `python main.py whatsapp-login` (scan the QR).
# WARNING: automating WhatsApp Web is against WhatsApp's ToS and can get the
# number banned — opt-in, use a number you accept that risk on.
whatsapp:
  enabled: false
  mode: "inline"                  # inline = ask at end of each run; listener = a long-running `whatsapp-listen` daemon owns the session and runs defer to it
  phone: ""                       # destination incl. country code, e.g. 919876543210 (your own = message yourself)
  profile_dir: "data/whatsapp_profile"
  headless: false                 # keep false so the QR window is visible on first link
  reply_timeout_seconds: 900      # wait up to 15 min for each reply, then leave the rest pending
  poll_interval_seconds: 5
  login_timeout_seconds: 180      # time allowed to scan the QR
  listen_idle_seconds: 20         # how often the listener re-checks for new pending questions
  skip_keyword: "skip"            # reply this to defer a question
  drop_keyword: "drop"              # reply this to abandon the job(s)
  ignore_keyword: "ignore"          # reply this to mark the question N/A forever

# Telegram is the recommended channel: official Bot API via long polling — no
# server/tunnel AND no ToS/ban risk (unlike WhatsApp Web automation). Create a
# bot with @BotFather, paste the token, run `python main.py telegram-login` and
# send /start to your bot. If both telegram and whatsapp are enabled, Telegram wins.
telegram:
  enabled: false
  mode: "inline"                  # inline = ask at end of each run; listener = serve runs Telegram in-process (or telegram-listen standalone)
  bot_token: ""                   # token from @BotFather
  chat_id: ""                     # leave blank; telegram-login captures it when you /start the bot
  reply_timeout_seconds: 900
  listen_idle_seconds: 20
  skip_keyword: "skip"
  drop_keyword: "drop"
  ignore_keyword: "ignore"

state:
  applied_jobs_file: "data/applied_jobs.json"
  log_file: "data/run.log"
  # Periodically wipe accumulated run state so the bot starts fresh and will
  # re-apply to previously-applied jobs. Clears the log, applied-jobs list,
  # technical failures, pending questions and run-issue log. Login sessions,
  # learned answers (user_memory) and the drop-keyword blocklist are kept.
  purge_enabled: true
  purge_interval_days: 7
